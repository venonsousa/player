<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Minha Rádio Online</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: #121212;
      overflow: hidden;
    }

    /* Fundo animado com bolhas */
    .background {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: -1;
    }

    .bubble {
      position: absolute;
      bottom: -100px;
      background: rgba(0, 200, 83, 0.4);
      border-radius: 50%;
      animation: rise 20s infinite ease-in;
    }

    @keyframes rise {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-120vh) scale(1.5); opacity: 0; }
    }

    .player {
      background: rgba(0,0,0,0.7);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      text-align: center;
      width: 420px;
      transition: all 0.4s ease;
      border: 2px solid transparent;
      animation: borderPulse 4s infinite;
    }

    @keyframes borderPulse {
      0% { border-color: #00c853; }
      50% { border-color: #009624; }
      100% { border-color: #00c853; }
    }

    .player h2 {
      color: #fff;
      margin-bottom: 10px;
    }

    .artist-photo {
      width: 300px;
      height: 200px;
      border-radius: 12px;
      object-fit: cover;
      margin-bottom: 10px;
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }

    .artist-photo:hover {
      transform: scale(1.03);
      box-shadow: 0 0 15px rgba(255,255,255,0.3);
    }

    .song-info {
      color: #fff;
      margin: 10px 0;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 15px;
    }

    .controls button {
      background: #00c853;
      border: none;
      color: #fff;
      padding: 10px 15px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.3s ease, transform 0.3s ease;
    }

    .controls button:hover {
      background: #009624;
      transform: scale(1.05);
    }

    .volume {
      width: 100%;
      margin-bottom: 15px;
    }

    .volume label {
      color: #fff;
      display: block;
      margin-bottom: 5px;
    }

    .volume input[type="range"] {
      width: 100%;
      accent-color: #00c853;
      transition: accent-color 0.3s ease;
    }

    .volume input[type="range"]:hover {
      accent-color: #00e676;
    }

    .stars {
      margin: 15px 0;
    }

    .stars span {
      font-size: 22px;
      cursor: pointer;
      color: #555;
      transition: color 0.3s ease, transform 0.3s ease;
    }

    .stars span:hover {
      transform: scale(1.2);
    }

    .stars span.active {
      color: gold;
    }

    .social-icons {
      margin-top: 15px;
      display: flex;
      justify-content: center;
      gap: 20px;
      padding-top: 10px;
      border-top: 1px solid #333;
    }

    .social-icons a img {
      width: 35px;
      height: 35px;
      transition: transform 0.3s ease;
    }

    .social-icons a img:hover {
      transform: scale(1.2);
    }
  </style>
</head>
<body>
  <!-- Fundo animado -->
  <div class="background">
    <div class="bubble" style="left:10%; width:40px; height:40px;"></div>
    <div class="bubble" style="left:30%; width:25px; height:25px;"></div>
    <div class="bubble" style="left:50%; width:60px; height:60px;"></div>
    <div class="bubble" style="left:70%; width:35px; height:35px;"></div>
    <div class="bubble" style="left:85%; width:50px; height:50px;"></div>
  </div>

  <div class="player">
    <h2>Minha Rádio Online</h2>
    <img src="https://culturainglesamg.com.br/wp-content/uploads/2026/02/BLOG_26-150x150.png?text=Artista" alt="Artista" class="artist-photo">

    <div class="song-info">
      <p id="songName">🎵 Tocando agora: Música Exemplo</p>
      <p id="dateTime"></p>
    </div>

    <audio id="radioPlayer">
      <source src="https://tu-stream-url.com/live.mp3" type="audio/mpeg">
    </audio>

    <div class="controls">
      <button onclick="playRadio()">▶ Play</button>
      <button onclick="pauseRadio()">⏸ Pause</button>
    </div>

    <div class="volume">
      <label for="vol">Volume</label>
      <input id="vol" type="range" min="0" max="1" step="0.1" onchange="setVolume(this.value)">
    </div>

    <div class="stars" id="rating">
      <span onclick="rateSong(1)">★</span>
      <span onclick="rateSong(2)">★</span>
      <span onclick="rateSong(3)">★</span>
      <span onclick="rateSong(4)">★</span>
      <span onclick="rateSong(5)">★</span>
    </div>

    <div class="social-icons">
      <a href="https://facebook.com" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook">
      </a>
      <a href="https://tiktok.com" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/3046/3046122.png" alt="TikTok">
      </a>
      <a href="https://instagram.com" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="Instagram">
      </a>
    </div>
  </div>

  <script>
    const player = document.getElementById("radioPlayer");
    const dateTimeEl = document.getElementById("dateTime");
    const stars = document.querySelectorAll(".stars span");

    function playRadio() {
      player.play();
    }

    function pauseRadio() {
      player.pause();
    }

    function setVolume(value) {
      player.volume = value;
    }

    // Atualizar data e hora em tempo real
    function updateDateTime() {
      const now = new Date();
      const options = { day: '2-digit', month: '2-digit', year: 'numeric' };
      const date = now.toLocaleDateString('pt-BR', options);
      const time = now.toLocaleTimeString('pt-BR');
      dateTimeEl.textContent = `📅 ${date} 🕒 ${time}`;
    }
    setInterval(updateDateTime, 1000);
    updateDateTime();

    // Sistema de votação por estrelas
    function rateSong(rating) {
      stars.forEach((star, index) => {
        if (index < rating) {
          star.classList.add("active");
        } else {
          star.classList.remove("active");
        }
      });
      alert(`Você deu ${rating} estrela(s) para esta música!`);
    }
  </script>
</body>
</html>
