<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Player Rádio Personalizado</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url('fundo.jpg') no-repeat center center fixed;
      background-size: cover;
      transition: background 2s ease;
    }

    .player {
      width: 420px;
      margin: 50px auto;
      padding: 20px;
      background: rgba(0,0,0,0.6);
      border-radius: 15px;
      color: #fff;
      text-align: center;
    }

    .artist-photo {
      width: 300px;
      height: 300px;
      border-radius: 20px;
      transition: transform 0.5s ease;
    }

    .artist-photo:hover {
      transform: scale(1.05);
    }

    .listeners {
      margin: 15px 0;
      font-size: 18px;
    }

    .datetime {
      margin-top: 15px;
      font-size: 16px;
    }

    /* Quadro estilizado */
    .song-box {
      margin-top: 20px;
      padding: 15px;
      border: 3px solid transparent;
      border-radius: 15px;
      background: linear-gradient(135deg, rgba(0,0,255,0.3), rgba(255,255,255,0.1));
      font-size: 20px;
      font-weight: bold;
      color: #fff;
      box-shadow: 0 0 20px rgba(0,150,255,0.8);
      animation: glow 2s infinite alternate;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
    }

    .song-text {
      background: linear-gradient(90deg, #fff, #0ff, #fff);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shine 4s linear infinite;
    }

    /* Disco de vinil animado */
    .vinyl {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: radial-gradient(circle at center, #000 60%, #444 100%);
      border: 3px solid #fff;
      position: relative;
      animation: spin 5s linear infinite;
    }

    .vinyl::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 10px;
      height: 10px;
      background: #fff;
      border-radius: 50%;
      transform: translate(-50%, -50%);
    }

    /* Controles do player */
    .controls {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 15px;
    }

    .controls button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: #3498db;
      color: #fff;
      cursor: pointer;
      transition: background 0.3s ease;
      font-size: 16px;
    }

    .controls button:hover {
      background: #2980b9;
    }

    @keyframes glow {
      from { box-shadow: 0 0 10px rgba(0,150,255,0.5); }
      to { box-shadow: 0 0 25px rgba(0,255,255,0.9); }
    }

    @keyframes shine {
      to { background-position: 200% center; }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="player">
    <img src="artista.jpg" alt="Foto do Artista" class="artist-photo">
    <div class="listeners">👥 1.234 ouvintes</div>

    <div class="datetime" id="datetime"></div>

    <!-- Quadro estilizado com disco girando -->
    <div class="song-box">
      <div class="vinyl"></div>
      <span class="song-text" id="songBox">Tocando agora: Nome da Música</span>
    </div>

    <!-- Controles do player -->
    <div class="controls">
      <button id="prevBtn">⏮️</button>
      <button id="playBtn">▶️</button>
      <button id="pauseBtn">⏸️</button>
      <button id="stopBtn">⏹️</button>
      <button id="nextBtn">⏭️</button>
    </div>
  </div>

  <script>
    // Hora e data em tempo real
    function atualizarDataHora(){
      const agora = new Date();
      const opcoes = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      const data = agora.toLocaleDateString('pt-BR', opcoes);
      const hora = agora.toLocaleTimeString('pt-BR');
      document.getElementById('datetime').textContent = data + " - " + hora;
    }

    setInterval(atualizarDataHora, 1000);
    atualizarDataHora();

    // Atualizar nome da música dinamicamente
    const songBox = document.getElementById('songBox');
    let musicaAtual = "Minha Música Favorita";
    songBox.textContent = "Tocando agora: " + musicaAtual;

    // Controles do player (simulação)
    document.getElementById('playBtn').addEventListener('click', () => {
      songBox.textContent = "Tocando agora: " + musicaAtual;
    });

    document.getElementById('pauseBtn').addEventListener('click', () => {
      songBox.textContent = "⏸️ Música pausada";
    });

    document.getElementById('stopBtn').addEventListener('click', () => {
      songBox.textContent = "⏹️ Música parada";
    });

    document.getElementById('prevBtn').addEventListener('click', () => {
      songBox.textContent = "⏮️ Música anterior";
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
      songBox.textContent = "⏭️ Próxima música";
    });
  </script>
</body>
</html>
