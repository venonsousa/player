    for(let i=0;i<11;i++){const d=document.createElement('div');d.classList.add('char-box');d.style.transitionDelay=`${i*0.05}s`;const img=document.createElement('img');img.src=charImages[i%charImages.length];if(i===1)img.style.objectPosition="15% center";if(i===7)img.style.objectPosition="90% center";if(i===9)img.style.objectPosition="95% center";d.appendChild(img);const n=document.createElement('div');n.classList.add('char-number');n.innerText=`0${i+1}`;d.appendChild(n);container.appendChild(d)}
    const boxes=document.querySelectorAll('.char-box');
    function initAudio(){if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext);analyser=audioCtx.createAnalyser();source=audioCtx.createMediaElementSource(audio);source.connect(analyser);analyser.connect(audioCtx.destination);analyser.fftSize=128;bufferLength=analyser.frequencyBinCount;dataArray=new Uint8Array(bufferLength);canvasCtx=visualizer.getContext('2d');drawVisualizer()}catch(e){console.log(e)}}if(audioCtx&&audioCtx.state==='suspended'){audioCtx.resume()}}
    function drawVisualizer(){animationId=requestAnimationFrame(drawVisualizer);analyser.getByteFrequencyData(dataArray);canvasCtx.clearRect(0,0,visualizer.width,visualizer.height);const barWidth=2;const gap=1;const totalVisualizerWidth=bufferLength*(barWidth+gap);let x=(visualizer.width-totalVisualizerWidth)/2;let barHeight;for(let i=0;i<bufferLength;i++){barHeight=dataArray[i]/2.8;canvasCtx.fillStyle='rgba(255,255,255,'+(barHeight/80+0.2)+')';canvasCtx.fillRect(x,visualizer.height-barHeight,barWidth,barHeight);x+=barWidth+gap}}
    startBtn.addEventListener('click',()=>{introScreen.classList.add('hidden');container.classList.add('active');audio.volume=0.5;initAudio();audio.play().then(()=>{playBtn.innerHTML="⏸"}).catch(()=>{});boxes.forEach((b,i)=>{setTimeout(()=>{b.classList.add('reveal')},i*120)});setTimeout(()=>{profileCard.classList.add('show')},1800)});
    function togglePlay(){if(audio.paused){if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();audio.play();playBtn.innerHTML="⏸"}else{audio.pause();playBtn.innerHTML="▶"}}
    audio.addEventListener("timeupdate",()=>{if(audio.duration){progressBar.style.width=(audio.currentTime/audio.duration)*100+"%"}});
    function switchTab(t,b){document.querySelectorAll(".tab-btn").forEach(e=>e.classList.remove("active"));document.querySelectorAll(".content-section").forEach(e=>e.classList.remove("active"));b.classList.add("active");document.getElementById(t).classList.add("active");const st=document.getElementById("sideTitle");if(t==='profile'){st.classList.remove("visible")}else{st.classList.add("visible")}}
    function toggleCard(s){if(s){profileCard.classList.add('show');reopenBtn.classList.remove('active')}else{profileCard.classList.remove('show');setTimeout(()=>{reopenBtn.classList.add('active')},300)}}
    reopenBtn.addEventListener('click',()=>{toggleCard(true)});
    </script>
  </body>
</html>
