<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Player Personalizado</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url('fundo.gif') no-repeat center center fixed;
      background-size: cover;
    }

    .player {
      width: 400px;
      margin: 50px auto;
      padding: 20px;
      background: rgba(0,0,0,0.6);
      border-radius: 15px;
      color: #fff;
      text-align: center;
    }

    .artist-photo {
      width: 300px;
      height: 300px;
      border-radius: 50%;
      transition: transform 0.5s ease;
    }

    .artist-photo:hover {
      transform: scale(1.05);
    }

    .listeners {
      margin: 15px 0;
      font-size: 18px;
    }

    .upload-btn {
      margin: 10px 0;
      padding: 10px 20px;
      background: #3498db;
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
    }

    .social-icons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }

    .social-icons a {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: #fff;
      position: relative;
      overflow: hidden;
    }

    /* Efeito água nas bordas */
    .social-icons a::before {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(0,150,255,0.5) 20%, transparent 70%);
      animation: wave 3s infinite linear;
    }

    @keyframes wave {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="player">
    <img src="artista.jpg" alt="Foto do Artista" class="artist-photo">
    <div class="listeners">👥 1.234 ouvintes</div>

    <input type="file" id="imageUpload" style="display:none" />
    <button class="upload-btn" onclick="document.getElementById('imageUpload').click()">Gerar Link da Imagem</button>
    <p id="imageLink"></p>

    <div class="social-icons">
      <a href="https://facebook.com" target="_blank">F</a>
      <a href="https://instagram.com" target="_blank">I</a>
      <a href="https://tiktok.com" target="_blank">T</a>
    </div>
  </div>

  <script>
    const input = document.getElementById('imageUpload');
    const linkDisplay = document.getElementById('imageLink');

    input.addEventListener('change', () => {
      const file = input.files[0];
      if(file){
        const url = URL.createObjectURL(file);
        linkDisplay.textContent = "Link gerado: " + url;
      }
    });
  </script>
</body>
</html>
