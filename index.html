<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Minha Rádio Online</title>
  <style>
    body {
      background: #121212;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .player {
      background: #1e1e1e;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      text-align: center;
      width: 350px;
      transition: all 0.4s ease;
    }

    .player h2 {
      color: #fff;
      margin-bottom: 10px;
    }

    .artist-photo {
      width: 100px;
      height: 100px;
      border-radius: 8px;
      object-fit: cover;
      margin-bottom: 10px;
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }

    .artist-photo:hover {
      transform: scale(1.05);
      box-shadow: 0 0 10px rgba(255,255,255,0.2);
    }

    .song-info {
      color: #fff;
      margin: 10px 0;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 15px;
    }

    .controls button {
      background: #00c853;
      border: none;
      color: #fff;
      padding: 10px 15px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.3s ease, transform 0.3s ease;
    }

    .controls button:hover {
      background: #009624;
      transform: scale(1.05);
    }

    .volume {
      width: 100%;
      margin-bottom: 15px;
    }

    .volume label {
      color: #fff;
      display: block;
      margin-bottom: 5px;
    }

    .volume input[type="range"] {
      width: 100%;
      accent-color: #00c853;
      transition: accent-color 0.3s ease;
    }

    .volume input[type="range"]:hover {
      accent-color: #00e676;
    }

    .stars {
      margin: 15px 0;
    }

    .stars span {
      font-size: 20px;
      cursor: pointer;
      color: #555;
      transition: color 0.3s ease, transform 0.3s ease;
    }

    .stars span:hover {
      transform: scale(1.2);
    }

    .stars span.active {
      color: gold;
    }

    /* Ícones flutuantes */
    .social-icons {
      position: fixed;
      top: 50%;
      left: 10px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      transform: translateY(-50%);
    }

    .social-icons a img {
      width: 35px;
      height: 35px;
      transition: transform 0.3s ease;
    }

    .social-icons a img:hover {
      transform: scale(1.2);
    }
  </style>
</head>
<body>
  <div class="player">
    <h2>Minha Rádio Online</h2>
    <img src="https://via.placeholder.com/100x100.png?text=Artista" alt="Artista" class="artist-photo">

    <div class="song-info">
      <p id="songName">🎵 Tocando agora: Música Exemplo</p>
      <p id="dateTime"></p>
    </div>

    <audio id="radioPlayer">
      <source src="https://tu-stream-url.com/live.mp3" type="audio/mpeg">
    </audio>

    <div class="controls">
      <button onclick="playRadio()">▶ Play</button>
      <button onclick="pauseRadio()">⏸ Pause</button>
    </div>

    <div class="volume">
      <label for="vol">Volume</label>
      <input id="vol" type="range" min="0" max="1" step="0.1" onchange="setVolume(this.value)">
    </div>

    <div class="stars" id="rating">
      <span onclick="rateSong(1)">★</span>
      <span onclick="rateSong(2)">★</span>
      <span onclick="rateSong(3)">★</span>
      <span onclick="rateSong(4)">★</span>
      <span onclick="rateSong(5)">★</span>
    </div>
  </div>

  <!-- Ícones flutuantes -->
  <div class="social-icons">
    <a href="https://facebook.com" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook">
    </a>
    <a href="https://tiktok.com" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/3046/3046122.png" alt="TikTok">
    </a>
    <a href="https://instagram.com" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="Instagram">
    </a>
  </div>

  <script>
    const player = document.getElementById("radioPlayer");
    const dateTimeEl = document.getElementById("dateTime");
    const stars = document.querySelectorAll(".stars span");

    function playRadio() {
      player.play();
    }

    function pauseRadio() {
      player.pause();
    }

    function setVolume(value) {
      player.volume = value;
    }

    // Atualizar data e hora em tempo real
    function updateDateTime() {
      const now = new Date();
      const options = { day: '2-digit', month: '2-digit', year: 'numeric' };
      const date = now.toLocaleDateString('pt-BR', options);
      const time = now.toLocaleTimeString('pt-BR');
      dateTimeEl.textContent = `📅 ${date} 🕒 ${time}`;
    }
    setInterval(updateDateTime, 1000);
    updateDateTime();

    // Sistema de votação por estrelas
    function rateSong(rating) {
      stars.forEach((star, index) => {
        if (index < rating) {
          star.classList.add("active");
        } else {
          star.classList.remove("active");
        }
      });
      alert(`Você deu ${rating} estrela(s) para esta música!`);
    }
  </script>
</body>
</html>
